name: Run Tests

on:
  push:
    branches: [main, stabilize-backend]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    services:
      mongodb:
        image: mongo:7.0
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'" --health-interval 10s --health-timeout 5s --health-retries 5
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test
        env:
          NODE_OPTIONS: --experimental-vm-modules
          SKIP_RAG: true
          MONGODB_URI: mongodb://localhost:27017/hospitofind-test
          SENTRY_DSN: https://placeholder@sentry.io/0
          ACCESS_TOKEN_SECRET: test-secret
          REFRESH_TOKEN_SECRET: test-refresh
          AUTH0_AUDIENCE: test-audience
          AUTH0_ISSUER: https://test-issuer.auth0.com/
          JWT_SECRET: test-jwt
          GROQ_API_KEY: test-key
